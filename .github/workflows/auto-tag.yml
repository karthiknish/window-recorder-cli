name: Auto Tag & Release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip — tag and release already exist
        if: steps.check_tag.outputs.exists == 'true' && steps.check_release.outputs.exists == 'true'
        run: |
          echo "Tag v${{ steps.version.outputs.version }} and release both exist. Nothing to do."

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Build WindowRecorder.app + CLI
        if: steps.check_release.outputs.exists == 'false'
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify CLI
        if: steps.check_release.outputs.exists == 'false'
        run: |
          ~/.local/bin/wr --help

      - name: Package artifacts
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p artifacts

          cd /Applications
          zip -r "$GITHUB_WORKSPACE/artifacts/WindowRecorder-v${VERSION}.app.zip" WindowRecorder.app

          cp ~/.local/bin/wr "$GITHUB_WORKSPACE/artifacts/wr-v${VERSION}"

          cd "$GITHUB_WORKSPACE"
          tar czf "artifacts/e2e-tools-v${VERSION}.tar.gz" --exclude='e2e/node_modules' --exclude='e2e/screenshots' --exclude='e2e/recordings' --exclude='e2e/results.json' e2e/

          printf '%s\n' \
            '#!/bin/bash' \
            'set -e' \
            'echo "Installing WindowRecorder..."' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            '' \
            'if [ -f "$SCRIPT_DIR/WindowRecorder-v"*.app.zip ]; then' \
            '  unzip -o "$SCRIPT_DIR"/WindowRecorder-v*.app.zip -d /tmp/' \
            '  cp -R /tmp/WindowRecorder.app /Applications/ 2>/dev/null || true' \
            '  echo "App installed to /Applications/WindowRecorder.app"' \
            'fi' \
            '' \
            'if [ -f "$SCRIPT_DIR/wr-v"* ]; then' \
            '  mkdir -p ~/.local/bin' \
            '  cp "$SCRIPT_DIR"/wr-v* ~/.local/bin/wr' \
            '  chmod +x ~/.local/bin/wr' \
            '  echo "CLI installed to ~/.local/bin/wr"' \
            '  echo "Add ~/.local/bin to your PATH if not already:"' \
            "  echo '  export PATH=\"\$HOME/.local/bin:\$PATH\"'" \
            'fi' \
            '' \
            'echo ""' \
            'echo "Done! Usage:"' \
            'echo "  wr launch        Start the recorder"' \
            'echo "  wr list          List windows"' \
            "echo \"  wr start --app 'Google Chrome' --out rec.mov --duration 30\"" \
            'echo "  wr e2e e2e/specs/example.json   Run E2E tests with recording"' \
            > artifacts/install.sh
          chmod +x artifacts/install.sh

      - name: Extract changelog for release notes
        if: steps.check_release.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/## \[${VERSION}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete incomplete release if it exists
        if: steps.check_release.outputs.exists == 'true' && steps.check_tag.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting incomplete release to recreate with artifacts..."
          gh release delete "v${{ steps.version.outputs.version }}" --repo "${{ github.repository }}" --yes || true

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false' || steps.check_tag.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: WindowRecorder v${{ steps.version.outputs.version }}
          body: |
            # WindowRecorder v${{ steps.version.outputs.version }}

            ## Release Notes

            ${{ steps.changelog.outputs.notes }}

            ## Downloads

            | File | Description |
            |------|-------------|
            | `WindowRecorder-v${{ steps.version.outputs.version }}.app.zip` | macOS app bundle (ScreenCaptureKit recorder daemon) |
            | `wr-v${{ steps.version.outputs.version }}` | CLI binary (`wr` command) |
            | `e2e-tools-v${{ steps.version.outputs.version }}.tar.gz` | E2E test runner + specs (requires Node.js) |
            | `install.sh` | Automated install script |

            ## Install

            1. Download all artifacts
            2. Run: `bash install.sh`
            3. Or manual install:
               - Unzip `WindowRecorder-*.app.zip` to `/Applications/`
               - Copy `wr-v*` to `~/.local/bin/wr`
               - Add `~/.local/bin` to your `PATH`

            ## Requirements

            - macOS 14+ (ScreenCaptureKit)
            - Screen Recording permission: System Settings > Privacy & Security > Screen Recording
            - Node.js 22+ (for E2E test runner only)

            ## Quick Start

            ```bash
            wr launch
            wr list
            wr start --app "Google Chrome" --out ~/Desktop/demo.mov --duration 30
            wr stop
            ```

            ## E2E Testing

            ```bash
            tar xzf e2e-tools-v${{ steps.version.outputs.version }}.tar.gz
            cd e2e && npm install
            wr e2e specs/example.json --record
            ```
          files: |
            artifacts/WindowRecorder-v${{ steps.version.outputs.version }}.app.zip
            artifacts/wr-v${{ steps.version.outputs.version }}
            artifacts/e2e-tools-v${{ steps.version.outputs.version }}.tar.gz
            artifacts/install.sh
