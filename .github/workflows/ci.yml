name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build WindowRecorder.app + CLI
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify CLI
        run: |
          ~/.local/bin/wr --help

      - name: Install e2e dependencies
        run: |
          cd e2e
          npm install

      - name: Verify e2e runner
        run: |
          cd e2e
          node runner.js --help

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          # Package the app as a zip
          cd /tmp
          zip -r "$GITHUB_WORKSPACE/artifacts/WindowRecorder-v${{ steps.version.outputs.version }}.app.zip" WindowRecorder.app
          # Package the CLI
          cp ~/.local/bin/wr "$GITHUB_WORKSPACE/artifacts/wr-v${{ steps.version.outputs.version }}"
          # Package e2e tools
          cd "$GITHUB_WORKSPACE"
          tar czf "artifacts/e2e-tools-v${{ steps.version.outputs.version }}.tar.gz" e2e/ --exclude='e2e/node_modules'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: window-recorder-v${{ steps.version.outputs.version }}
          path: artifacts/
          retention-days: 30
